name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Type Check ────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  # ── Next.js Build Check ──────────────────────────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: lint

    env:
      # Dummy values so the build succeeds without real Firebase credentials
      NEXT_PUBLIC_FIREBASE_API_KEY:             dummy-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:         dummy.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID:          dummy-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:      dummy.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID:              "1:000000000000:web:dummy"
      NEXT_PUBLIC_API_URL:                      http://localhost:5000
      SERVER_BASE_URL:                          http://localhost:5000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js
        run: npm run build

  # ── Docker Build Check ───────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    # Only run Docker build on pushes to main (not on every PR to save minutes)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: lootops-cloud:ci
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=dummy-api-key
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=dummy.firebaseapp.com
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=dummy-project
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=dummy.appspot.com
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=000000000000
            NEXT_PUBLIC_FIREBASE_APP_ID=1:000000000000:web:dummy
            NEXT_PUBLIC_API_URL=http://localhost:5000
            SERVER_BASE_URL=http://localhost:5000
