services:
  # ─────────────────────────────────────────────────────
  # LootOps Cloud — Main Application
  # Runs both the Next.js frontend (port 3000)
  # and Express API backend (port 5000)
  # ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lootops_app
    restart: unless-stopped

    ports:
      - "3000:3000"   # Next.js UI
      - "5000:5000"   # Express API

    volumes:
      # Persistent storage for all uploaded files and the database
      - lootops_data:/data/uploads

    environment:
      # ── Server ─────────────────────────────────────────────────────────
      PORT: 5000
      UPLOAD_PATH: /data/uploads
      SERVER_BASE_URL: ${SERVER_BASE_URL:-http://localhost:5000}
      API_KEY: ${API_KEY}

      # ── Firebase Admin SDK (Server-side) ───────────────────────────────
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}

      # ── Firebase Client (Next.js Frontend) ────────────────────────────
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}

      # ── API URL (used by Next.js to reach Express) ─────────────────────
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}

      # ── SMTP / Email (Optional) ────────────────────────────────────────
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}

      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ─────────────────────────────────────────────────────
# Named volume — your uploaded files live here
# ─────────────────────────────────────────────────────
volumes:
  lootops_data:
    driver: local
